<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        } 

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            margin-bottom: 20px;
        }

        .score {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0;
            transition: color 0.5s ease;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .progress {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 1.5s ease-in-out;
        }

        .message {
            margin-top: 15px;
            font-size: 1.5rem;
            color: #cbd5f5;
        }

        .badge {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .btn {
            margin-top: 10px;
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            background: #0ea5e9;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }


        .btn:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>🎯 Prediction Result</h1>

        <div class="content">
            <div class="score" id="score">0</div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>

            <div class="feedback">
                <div class="message" id="message"></div>
                <div id="badge"></div>
            </div>

            <a href="/predict_datapoint" class="btn">Try Again</a>
        </div>
    </div>


    <script>
        const finalScore = {{ results|int }};
        let current = 0;

        const scoreEl = document.getElementById("score");
        const progressEl = document.getElementById("progress");
        const messageEl = document.getElementById("message");
        const badgeEl = document.getElementById("badge");

        // Smooth count animation
        const increment = finalScore / 50;

        const interval = setInterval(() => {
            current += increment;
            if (current >= finalScore) {
                current = finalScore;
                clearInterval(interval);
            }
            scoreEl.innerText = Math.floor(current);
        }, 20);

        setTimeout(() => {
            progressEl.style.width = finalScore + "%";

            let color, message, badge;

            if (finalScore < 40) {
                color = "#ef4444"; // red
                message = "⚠️ Needs Improvement";
                badge = "Low Performance";
            } else if (finalScore < 70) {
                color = "#f59e0b"; // yellow
                message = "👍 Average Performance";
                badge = "Moderate";
            } else {
                color = "#22c55e"; // green
                message = "🔥 Strong Performance";
                badge = "Excellent";
            }

            scoreEl.style.color = color;
            progressEl.style.background = color;
            messageEl.innerText = message;

            badgeEl.innerHTML = `<span class="badge" style="background:${color}; color:white;">${badge}</span>`;

        }, 200);
    </script>

</body>

</html>
